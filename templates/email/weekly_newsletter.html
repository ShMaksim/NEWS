<!DOCTYPE html>
<html>
<head>
    <title>Еженедельная рассылка</title>
</head>
<body>
    <h1>Привет, {{ user.username }}!</h1>
    <p>Вот список новых статей за последнюю неделю в категории {{ category.name }}:</p>
    <ul>
        {% for post in posts %}
            <li><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></li>
        {% endfor %}
    </ul>
    <p>Спасибо, что читаете нас!</p>
</body>
</html>
